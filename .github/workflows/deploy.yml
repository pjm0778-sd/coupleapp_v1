name: Flutter Web → Cloudflare Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Cloudflare Pages보다 늦게 실행되도록 딜레이 추가 (504 방지)
    steps:
      - name: Wait before deploy (90s to avoid 504 timeout)
        run: sleep 90s
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Flutter 설치 (stable 최신 버전 자동 사용)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      # 3. 패키지 설치
      - name: Install dependencies
        run: flutter pub get

      # 4. 웹 빌드
      - name: Build Flutter Web
        run: flutter build web --release

      # 5. Cloudflare Pages 배포 (wrangler 사용 + 재시도 로직)
      - name: Deploy to Cloudflare Pages (with retry)
        uses: nick-fields/retry-action@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: npx wrangler pages deploy build/web --project-name=coupleapp-v1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
